server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Vite emits content-hashed filenames into /assets/ (e.g. index-DXMhw7Xc.js).
    # Hashed = immutable — safe to cache for a year. The previous default (4h) made
    # Lighthouse flag every asset; this lets Cloudflare honor a long TTL.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # Self-hosted fonts use stable filenames. Same caching rules.
    location /fonts/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # Static brand asset — keep it cacheable but allow easier invalidation.
    location = /kv.png {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
    }

    # Service worker, manifest, sitemap, robots — must NOT be cached aggressively or
    # PWA users will be stuck on stale code. SW especially: short TTL is the standard.
    location = /sw.js {
        add_header Cache-Control "public, max-age=0, must-revalidate" always;
    }
    location = /workbox- {
        add_header Cache-Control "public, max-age=0, must-revalidate" always;
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "public, max-age=3600" always;
    }
    location = /sitemap.xml {
        add_header Cache-Control "public, max-age=3600" always;
    }
    location = /robots.txt {
        add_header Cache-Control "public, max-age=86400" always;
    }
    # Index document gets short cache too — the SPA shell needs to update on every
    # deploy so the new /assets/ hashes are served.
    location = /index.html {
        add_header Cache-Control "public, max-age=0, must-revalidate" always;
        # Mirror Cloudflare's CF-IPCountry into a non-HttpOnly cookie so the SPA
        # can read it on first paint and pick a sensible default locale (e.g.
        # "ID" → Bahasa Indonesia). Sticks for 24h; once the user picks a locale
        # explicitly, the persisted IndexedDB profile takes over.
        add_header Set-Cookie "cf_country=$http_cf_ipcountry; Path=/; Max-Age=86400; SameSite=Lax" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Set-Cookie "cf_country=$http_cf_ipcountry; Path=/; Max-Age=86400; SameSite=Lax" always;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
